name: Release Build

on:
  push:
    tags:
      - 'v*'

env:
  STRICT_CHANGELOG_RELEASE_NOTES: "false"

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libcurl4-openssl-dev

      - name: Configure and build
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build .

      - name: Upload Linux binary
        uses: actions/upload-artifact@v5
        with:
          name: ollama-monitor-linux-x64
          path: build/ollama-monitor
          retention-days: 7

  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure and build
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64
          cmake --build . --config Release

      - name: Upload Windows binary
        uses: actions/upload-artifact@v5
        with:
          name: ollama-monitor-windows-x64
          path: build/Release/ollama-monitor.exe
          retention-days: 7

  create-release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v5
        with:
          name: ollama-monitor-linux-x64
          path: release

      - name: Download Windows artifact
        uses: actions/download-artifact@v5
        with:
          name: ollama-monitor-windows-x64
          path: release

      - name: List release files
        run: ls -la release/

      - name: Build release notes
        id: notes
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          NOTES_FILE="release_notes.md"

          awk -v tag="$TAG" '
            $0 ~ "^## \\[" tag "\\]" {in_section=1; next}
            in_section && $0 ~ "^## \\[" {exit}
            in_section {print}
          ' CHANGELOG.md > "$NOTES_FILE"

          if [ ! -s "$NOTES_FILE" ] || ! grep -q '[^[:space:]]' "$NOTES_FILE"; then
            if [ "${STRICT_CHANGELOG_RELEASE_NOTES}" = "true" ]; then
              echo "ERROR: Missing release notes in CHANGELOG.md for tag ${TAG}" >&2
              echo "Expected a section header like: ## [${TAG}]" >&2
              exit 1
            fi
            echo "use_generated=true" >> "$GITHUB_OUTPUT"
          else
            echo "use_generated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release (changelog notes)
        if: steps.notes.outputs.use_generated == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            release/ollama-monitor \
            release/ollama-monitor.exe \
            --verify-tag \
            --notes-file release_notes.md

      - name: Create GitHub Release (generated notes fallback)
        if: steps.notes.outputs.use_generated == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            release/ollama-monitor \
            release/ollama-monitor.exe \
            --verify-tag \
            --generate-notes
